<div class="profile-wrapper">
  @if (member()) {
    <div class="profile-card">

      <div class="profile-banner">
        <div class="profile-avatar">
          <img [src]="isAdmin() ? 'avatar-admin.png' : gender() === 'F' ? 'avatar-woman.png' : 'avatar-man.png'" alt="Avatar" />
        </div>
      </div>

      <div class="profile-identity">
        <h2>{{ member()!.username }}</h2>
        <span class="profile-role">{{ member()!.role }}</span>
      </div>

      <div class="profile-stats">
        <div class="stat-card">
          <span class="stat-value">{{ member()!.elo }}</span>
          <span class="stat-label">Elo</span>
        </div>
        <div class="stat-card">
          <span class="stat-value">{{ member()!.gender }}</span>
          <span class="stat-label">Genre</span>
        </div>
      </div>

      <div class="profile-info">
        <p><span>📧</span> {{ member()!.email }}</p>
        <p><span>🎂</span> {{ member()!.birthDate | date:'dd-MM-yyyy' }}</p>
      </div>

      <a routerLink="/profile/edit" class="btn-edit">Modifier mon profil</a>

    </div>
  } @else {
    <app-loading />
  }
</div>
