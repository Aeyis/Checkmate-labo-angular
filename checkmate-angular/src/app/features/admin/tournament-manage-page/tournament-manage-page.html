<div class="admin-wrapper">
  @if (tournament()) {
    <div class="manage-card">
      <h1>{{ tournament()!.name }}</h1>
      <p><strong>Statut :</strong> {{ tournament()!.status }}</p>
      <p><strong>Lieu :</strong> {{ tournament()!.location }}</p>

      <div class="actions">
        <button class="btn-start" (click)="start()">Démarrer</button>
        <button class="btn-next" (click)="nextRound()">Round suivant</button>
        <button class="btn-delete" (click)="delete()">Supprimer</button>
      </div>

      <a routerLink="/admin/tournament">Retour</a>
    </div>
  } @else {
    <p>Chargement...</p>
  }
</div>
