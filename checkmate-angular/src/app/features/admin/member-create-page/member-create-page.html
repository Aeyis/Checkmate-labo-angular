<app-form-card title="Nouveau membre">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="username">Nom d'utilisateur</label>
      <input id="username" type="text" formControlName="username"
        [class.input-error]="username.invalid && username.touched" />
      <app-forms-error-display [control]="username" name="Nom d'utilisateur" />
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email"
        [class.input-error]="email.invalid && email.touched" />
      <app-forms-error-display [control]="email" name="Email" />
    </div>
    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input id="password" type="password" formControlName="password"
        [class.input-error]="password.invalid && password.touched" />
      <app-forms-error-display [control]="password" name="Mot de passe" />
    </div>
    <div class="form-group">
      <label for="birthdate">Date de naissance</label>
      <input id="birthdate" type="date" formControlName="birthdate"
        [class.input-error]="birthdate.invalid && birthdate.touched" />
      <app-forms-error-display [control]="birthdate" name="Date de naissance" />
    </div>
    <div class="form-group">
      <label for="gender">Genre</label>
      <select id="gender" formControlName="gender"
        [class.input-error]="gender.invalid && gender.touched">
        <option value="">-- Choisir --</option>
        <option value="M">Homme</option>
        <option value="F">Femme</option>
        <option value="O">Autre</option>
      </select>
      <app-forms-error-display [control]="gender" name="Genre" />
    </div>
    <app-message-display [error]="errorMessage" />
    <button class="btn-submit" type="submit" [disabled]="isInvalid()">Créer</button>
  </form>
</app-form-card>
