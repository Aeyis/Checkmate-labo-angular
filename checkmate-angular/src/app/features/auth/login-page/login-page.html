<a routerLink="/tournament" class="back-link">← Retour aux tournois</a>
<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-card__title">Connexion</h2>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email"
          [class.input-error]="email.invalid && email.touched" />
        <app-forms-error-display [control]="email" name="Email" />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" formControlName="password"
          [class.input-error]="password.invalid && password.touched" />
        <app-forms-error-display [control]="password" name="Mot de passe" />
      </div>
      @if (errorMessage) {
        <p class="error-global">{{ errorMessage }}</p>
      }
      <button class="btn-submit" type="submit">Se connecter</button>

      <p class="register-link">Pas encore de compte ? <a routerLink="/auth/register">S'inscrire</a></p>
    </form>
  </div>
</div>
