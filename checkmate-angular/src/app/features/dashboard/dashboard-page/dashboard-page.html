<div class="dashboard-wrapper">
  @if (member) {
    <div class="dashboard-welcome">
      <h1>Bonjour, {{ member.username }} 👋</h1>
      <p>Elo : <strong>{{ member.elo }}</strong></p>
    </div>

    <div class="dashboard-links">
      <a routerLink="/profile" class="dashboard-card">Mon profil</a>
      <a routerLink="/tournament" class="dashboard-card">Tournois</a>
      @if (isAdmin()) {
        <a routerLink="/admin/members" class="dashboard-card admin">Admin membres</a>
        <a routerLink="/admin/tournament/create" class="dashboard-card admin">Créer un tournoi</a>
      }
    </div>
  } @else {
    <p>Chargement...</p>
  }
</div>
