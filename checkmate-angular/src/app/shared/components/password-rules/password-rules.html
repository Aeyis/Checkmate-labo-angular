<div class="password-rules">
  <p [class.valid]="hasMinLength()">{{ hasMinLength() ? '✓' : '✗' }} 8 caractères minimum</p>
  <p [class.valid]="hasUppercase()">{{ hasUppercase() ? '✓' : '✗' }} Une majuscule</p>
  <p [class.valid]="hasLowercase()">{{ hasLowercase() ? '✓' : '✗' }} Une minuscule</p>
  <p [class.valid]="hasNumber()">{{ hasNumber() ? '✓' : '✗' }} Un chiffre</p>
  <p [class.valid]="hasSpecialChar()">{{ hasSpecialChar() ? '✓' : '✗' }} Un caractère spécial</p>
</div>
