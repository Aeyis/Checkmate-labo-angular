<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CheckmateAngular</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root>
    <div style="width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;">
      <div style="width:44px;height:44px;border:3px solid rgba(255,215,0,0.2);border-top-color:#FFD700;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  </app-root>
</body>
</html>
